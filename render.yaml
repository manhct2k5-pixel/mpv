services:
  - type: web
    name: wealthwallet-api
    runtime: docker
    plan: free
    rootDir: backend-java
    dockerfilePath: ./backend-java/Dockerfile
    dockerContext: ./backend-java
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: local
      - key: STYLE_AI_ENABLED
        value: "false"
      - key: JWT_SECRET
        generateValue: true
